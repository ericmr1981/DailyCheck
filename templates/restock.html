{% extends "base.html" %}
{% block content %}
<h2>入库记录</h2>
<form method="post" action="{{ url_for('restock.restock_start') }}" class="form-inline">
  <button type="submit">新建入库</button>
</form>

<table>
  <tr><th>时间</th><th>品项</th><th>入库数量</th><th>原因</th><th>状态</th><th>操作</th></tr>
  {% for r in requests %}
  <tr>
    <td>{{ r.created_at }}</td>
    <td>{{ r.item_name }}</td>
    <td>{{ r.requested_quantity | fmt_qty }} {{ r.unit }}</td>
    <td>{{ r.reason }}</td>
    <td>{{ r.status }}</td>
    <td>
      <form method="post" action="{{ url_for('restock.delete', req_id=r.id) }}" class="inline" onsubmit="return confirm('确认删除该记录？删除后将回滚库存。');">
        <button type="submit">删除</button>
      </form>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
