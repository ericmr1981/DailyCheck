<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>离线模式</title>
  <style>
    body { margin:0; font-family: "PingFang SC","Microsoft YaHei",sans-serif; background:#eef2f6; color:#1f2d3d; display:grid; place-items:center; min-height:100dvh; }
    .box { background:#fff; border:1px solid #d9e1ea; border-radius:16px; padding:24px; width:min(92vw,420px); }
    h1 { margin:0 0 8px; font-size:20px; }
    p { margin:0; color:#6b7280; }
  </style>
</head>
<body>
  <div class="box">
    <h1>当前离线</h1>
    <p>网络恢复后将自动继续使用库存管理系统。</p>
  </div>
</body>
</html>
