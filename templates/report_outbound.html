{% extends 'base.html' %}
{% block content %}
<h2>出库报告</h2>
<div class="inline" style="margin-bottom:12px">
  <a href="{{ url_for('report_outbound', scope='today') }}" class="btn-sm {% if scope == 'today' %}btn-edit{% endif %}" style="{% if scope != 'today' %}color:var(--text);border-color:var(--border);text-decoration:none{% endif %}">当日</a>
  <a href="{{ url_for('report_outbound', scope='all') }}" class="btn-sm {% if scope == 'all' %}btn-edit{% endif %}" style="{% if scope != 'all' %}color:var(--text);border-color:var(--border);text-decoration:none{% endif %}">总计</a>
</div>
<table>
  <tr><th>操作时间</th><th>品项</th><th>出库总数量</th><th>出库次数</th></tr>
  {% for r in records %}
  <tr>
    <td>{{ r.last_time }}</td>
    <td>{{ r.item_name }}</td>
    <td>{{ r.total_qty }} {{ r.unit }}</td>
    <td>{{ r.times }} 次</td>
  </tr>
  {% else %}
  <tr><td colspan="4" style="text-align:center;color:var(--muted)">暂无出库记录</td></tr>
  {% endfor %}
</table>
{% endblock %}
