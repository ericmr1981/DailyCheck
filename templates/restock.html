{% extends 'base.html' %}
{% block content %}
<h2>补货记录</h2>
<form method="post" action="{{ url_for('restock_start') }}" class="form-inline">
  <button type="submit">开始补货</button>
</form>

<table>
  <tr><th>时间</th><th>品项</th><th>补货数量</th><th>原因</th><th>状态</th><th>操作</th></tr>
  {% for r in requests %}
  <tr>
    <td>{{ r.created_at }}</td>
    <td>{{ r.item_name }}</td>
    <td>{{ r.requested_quantity }} {{ r.unit }}</td>
    <td>{{ r.reason }}</td>
    <td>{{ r.status }}</td>
    <td>
      {% if r.status == '提交' %}
      <form method="post" action="{{ url_for('update_restock_status', req_id=r.id) }}" class="inline" onsubmit="return confirm('确认将该补货记录执行入库？');">
        <input type="hidden" name="status" value="入库" />
        <button type="submit">入库</button>
      </form>
      {% else %}
      已入库
      {% endif %}
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
