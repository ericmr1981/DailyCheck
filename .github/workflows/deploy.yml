name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$VPS_SSH_KEY" > vps_key
          chmod 600 vps_key

          # Build tar locally (exclude volatile/generated files)
          tar --exclude='.git' \
              --exclude='__pycache__' \
              --exclude='*.log' \
              --exclude='.venv' \
              --exclude='inventory.db' \
              --exclude='inventory.db.bak' \
              -czf /tmp/dailycheck.tar.gz .

          # Stream tar to VPS via SSH
          cat /tmp/dailycheck.tar.gz | ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              -p "$VPS_PORT" -i vps_key \
              "$VPS_USERNAME@$VPS_HOST" \
              'cat > /tmp/dailycheck.tar.gz'

          # Full deploy on VPS
          ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              -p "$VPS_PORT" -i vps_key \
              "$VPS_USERNAME@$VPS_HOST" << 'ENDSSH'
            set -e
            cd /root/DailyCheck
            pkill -f "gunicorn.*app:app" || true
            tar -xzf /tmp/dailycheck.tar.gz
            rm -f /tmp/dailycheck.tar.gz
            rm -rf .venv
            python3 -m venv .venv
            .venv/bin/pip install -r requirements.txt -q
            .venv/bin/gunicorn -w 2 -b 0.0.0.0:8080 app:app \
                --timeout 120 \
                --access-logfile access.log \
                --error-logfile error.log -D
            echo "Deploy done"
          ENDSSH
