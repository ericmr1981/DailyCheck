{% extends 'base.html' %}
{% block content %}
<h2>库存品管理</h2>
<form method="post" class="grid cols-3">
  <input name="name" placeholder="品项名称" required />
  <select name="category_id" required>
    <option value="">选择品类</option>
    {% for c in categories %}
    <option value="{{ c.id }}">{{ c.name }}</option>
    {% endfor %}
  </select>
  <input name="quantity" type="number" min="0" placeholder="初始库存" />
  <input name="safety_stock" type="number" min="0" placeholder="安全库存" />
  <input name="unit" placeholder="单位（默认件）" />
  <button type="submit">新增库存品</button>
</form>

<table>
  <tr><th>品项</th><th>品类</th><th>库存</th><th>安全库存</th><th>更新时间</th><th>操作</th></tr>
  {% for i in items %}
  <tr>
    <td>{{ i.name }}</td><td>{{ i.category_name }}</td>
    <td>{{ i.quantity }} {{ i.unit }}</td><td>{{ i.safety_stock }}</td><td>{{ i.updated_at }}</td>
    <td class="inline">
      <a href="{{ url_for('edit_item', item_id=i.id) }}" class="btn-sm btn-edit">编辑</a>
      <form method="post" action="{{ url_for('delete_item', item_id=i.id) }}" class="inline" onsubmit="return confirm('确认删除该库存品？');">
        <button type="submit" class="btn-sm btn-delete">删除</button>
      </form>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
