{% extends 'base.html' %}
{% block content %}
<h2>编辑库存品</h2>
<form method="post" class="grid cols-3">
  <label>
    <span>品项名称</span>
    <input name="name" value="{{ item.name }}" required />
  </label>
  <label>
    <span>品类</span>
    <select name="category_id" required>
      <option value="">选择品类</option>
      {% for c in categories %}
      <option value="{{ c.id }}" {% if c.id == item.category_id %}selected{% endif %}>{{ c.name }}</option>
      {% endfor %}
    </select>
  </label>
  <label>
    <span>库存数量</span>
    <input name="quantity" type="number" min="0" value="{{ item.quantity }}" />
  </label>
  <label>
    <span>安全库存</span>
    <input name="safety_stock" type="number" min="0" value="{{ item.safety_stock }}" />
  </label>
  <label>
    <span>进货单价（¥）</span>
    <input name="unit_cost" type="number" min="0" step="0.001" value="{{ item.unit_cost or 0 }}" />
  </label>
  <label>
    <span>单位</span>
    <input name="unit" value="{{ item.unit }}" placeholder="件" />
  </label>
  <a href="{{ url_for('items') }}" class="btn-cancel">取消</a>
  <button type="submit">保存修改</button>
</form>
{% endblock %}
