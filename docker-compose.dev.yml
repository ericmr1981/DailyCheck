services:
  app:
    build: .
    container_name: dailycheck-dev
    ports:
      - "8080:8080"   # Flask dev server
      - "5100:5100"   # MCP HTTP/SSE
    environment:
      - FLASK_DEBUG=1
      - DAILYCHECK_SECRET_KEY=dev-secret-key-not-for-prod
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount source for live reload
      - .:/app
      # Persist DBs on host so restarts don't wipe data
      - ./db/master.db:/app/db/master.db
      - ./db/warehouses:/app/db/warehouses
      # Avoid container's __pycache__ shadowing the host volume
      - /app/__pycache__
      - /app/.venv
      - /app/static
      - /app/templates
    restart: unless-stopped
