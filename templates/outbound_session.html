{% extends 'base.html' %}
{% block content %}
<h2>出库录入</h2>
<p>请根据当前库存状态填写出库数量。留空表示本次不出该品项。</p>
<form method="post" action="{{ url_for('outbound_submit') }}">
  <div class="form-inline">
    <input name="reason" placeholder="本次出库原因（可选）" />
    <button type="submit">提交并出库</button>
  </div>

  <table>
    <tr><th>品类</th><th>品项</th><th>当前库存</th><th>安全库存</th><th>出库数量（填写）</th></tr>
    {% for i in items %}
    <tr>
      <td>{{ i.category_name }}</td>
      <td>{{ i.name }}</td>
      <td>{{ i.quantity }} {{ i.unit }}</td>
      <td>{{ i.safety_stock }}</td>
      <td><input type="number" min="0" name="outbound_{{ i.id }}" placeholder="留空=不出库" /></td>
    </tr>
    {% endfor %}
  </table>
</form>
{% endblock %}
