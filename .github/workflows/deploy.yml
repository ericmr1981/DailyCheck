name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Deploy to VPS via rsync
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          # Save SSH key
          echo "$VPS_SSH_KEY" > vps_key
          chmod 600 vps_key

          # Stop old service (gunicorn)
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              -p "$VPS_PORT" -i vps_key "$VPS_USERNAME@$VPS_HOST" \
              'pkill -f "gunicorn.*app:app" || true'

          # Rsync project files (exclude .git, __pycache__, *.log, .venv)
          rsync -avz \
              -e "ssh -o StrictHostKeyChecking=no -p $VPS_PORT -i vps_key" \
              --exclude '.git' \
              --exclude '__pycache__' \
              --exclude '*.log' \
              --exclude '.venv' \
              --exclude 'inventory.db' \
              --exclude 'inventory.db.bak' \
              ./ "$VPS_USERNAME@$VPS_HOST:/root/DailyCheck/"

          # Re-create venv and install dependencies on VPS
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              -p "$VPS_PORT" -i vps_key "$VPS_USERNAME@$VPS_HOST" \
              'cd /root/DailyCheck && rm -rf .venv && python3 -m venv .venv && .venv/bin/pip install -r requirements.txt -q'

          # Restart gunicorn
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              -p "$VPS_PORT" -i vps_key "$VPS_USERNAME@$VPS_HOST" \
              'cd /root/DailyCheck && .venv/bin/gunicorn -w 2 -b 0.0.0.0:8080 app:app --timeout 120 --access-logfile access.log --error-logfile error.log -D'

          echo "Deploy complete"
