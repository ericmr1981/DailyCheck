<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="库存管理" />
  <title>{{ title or "轻量库存管理" }}</title>
  <link rel="manifest" href="{{ url_for('webmanifest') }}" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <aside class="sidebar desktop-only">
    <h1>库存管理</h1>
    <a href="{{ url_for('dashboard') }}">总览</a>
    <a href="{{ url_for('categories') }}">品类管理</a>
    <a href="{{ url_for('items') }}">库存品管理</a>
    <a href="{{ url_for('stocktake') }}">库存盘点</a>
    <a href="{{ url_for('inventory') }}">库存查阅</a>
    <a href="{{ url_for('restock') }}">补货记录</a>
  </aside>

  <div class="app-shell">
    <header class="mobile-header mobile-only">
      <p class="mobile-subtitle">仓储运营</p>
      <h1>轻量库存管理</h1>
    </header>

    <main>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
        <ul class="flash-list">
          {% for msg in messages %}
            <li>{{ msg }}</li>
          {% endfor %}
        </ul>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>

    <nav class="mobile-nav mobile-only">
      <a href="{{ url_for('dashboard') }}">总览</a>
      <a href="{{ url_for('inventory') }}">库存</a>
      <a href="{{ url_for('items') }}">品项</a>
      <a href="{{ url_for('stocktake') }}">盘点</a>
      <a href="{{ url_for('restock') }}">补货</a>
    </nav>
  </div>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js");
      });
    }
  </script>
</body>
</html>
